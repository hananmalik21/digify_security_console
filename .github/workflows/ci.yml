name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Generate l10n and assets
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze lib/integration lib/security_console/presentation lib/security_console/data lib/security_console/domain
